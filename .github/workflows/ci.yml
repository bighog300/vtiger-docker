name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      - name: Actionlint
        uses: raven-actions/actionlint@v2

  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build installer image
        run: docker compose -f docker-compose.build.yml build installer

      - name: Run full build pipeline (install + schema export + runtime build)
        run: IMAGE=vtigercrm-ci VERSION=8.3.0 ./build.sh --no-push

      - name: Verify schema.sql
        run: |
          test -s schema.sql
          LINES=$(wc -l < schema.sql)
          echo "schema.sql: ${LINES} lines"
          test "${LINES}" -gt 100

      - name: Start runtime smoke-test stack
        run: |
          docker network create vtiger-ci || true
          docker run -d --name vtiger-ci-mysql --network vtiger-ci \
            -e MYSQL_ROOT_PASSWORD=root \
            -e MYSQL_DATABASE=vtiger \
            -e MYSQL_USER=vtiger \
            -e MYSQL_PASSWORD=vtigerpass \
            mysql:8.0
          for i in $(seq 1 60); do
            docker exec vtiger-ci-mysql mysqladmin ping -h localhost -uroot -proot --silent 2>/dev/null && break
            sleep 3
          done
          docker run -d --name vtiger-ci-app --network vtiger-ci -p 8080:80 \
            -e DB_HOST=vtiger-ci-mysql \
            -e DB_PORT=3306 \
            -e DB_NAME=vtiger \
            -e DB_USER=vtiger \
            -e DB_PASSWORD=vtigerpass \
            -e DB_ROOT_PASSWORD=root \
            -e VTIGER_SITE_URL=http://localhost:8080 \
            vtigercrm-ci:8.3.0

      - name: Smoke check HTTP
        run: |
          for i in $(seq 1 60); do
            code="$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080 || true)"
            if [ "$code" != "000" ] && [ -n "$code" ]; then
              echo "Got HTTP ${code} — app is responding."
              exit 0
            fi
            echo "Attempt ${i}/60 — waiting for app..."
            sleep 3
          done
          echo "App never responded on port 8080."
          docker logs vtiger-ci-app || true
          exit 1

      - name: Upload logs and schema on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-${{ github.sha }}
          retention-days: 7
          path: schema.sql

      - name: Tear down
        if: always()
        run: |
          docker logs vtiger-ci-app 2>/dev/null | tail -50 || true
          docker rm -f vtiger-ci-app vtiger-ci-mysql || true
          docker network rm vtiger-ci || true
          docker compose -f docker-compose.build.yml down -v || true
