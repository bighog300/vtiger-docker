name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      - name: Actionlint
        uses: raven-actions/actionlint@v2

  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Regression check config template rendering
        run: |
          export DB_HOST=mysql
          export DB_PORT=3306
          export DB_NAME=vtiger
          export DB_USER=vtiger
          export DB_PASSWORD=vtigerpass
          export VTIGER_SITE_URL=http://localhost:8080
          export VTIGER_ADMIN_USER=admin
          export VTIGER_ADMIN_PASSWORD='Admin@1234'
          export VTIGER_ADMIN_EMAIL=admin@example.com
          export VTIGER_TIMEZONE=UTC
          export VTIGER_LANGUAGE=en_us
          export VTIGER_CURRENCY=USD
          export VTIGER_COMPANY_NAME=VEMS
          CONFIG_ENVSUBST_VARS='${DB_HOST} ${DB_PORT} ${DB_NAME} ${DB_USER} ${DB_PASSWORD} ${VTIGER_SITE_URL} ${VTIGER_ADMIN_USER} ${VTIGER_ADMIN_PASSWORD} ${VTIGER_ADMIN_EMAIL} ${VTIGER_TIMEZONE} ${VTIGER_LANGUAGE} ${VTIGER_CURRENCY} ${VTIGER_COMPANY_NAME}'
          tmp_config="$(mktemp)"
          envsubst "${CONFIG_ENVSUBST_VARS}" < config/config.inc.php.tpl > "${tmp_config}"
          php -l "${tmp_config}"
          grep -q '\$dbconfig' "${tmp_config}"
          grep -q '\$site_URL' "${tmp_config}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build installer image
        run: docker compose -f docker-compose.build.yml build installer

      - name: Run full build pipeline (install + schema export + runtime build)
        run: IMAGE=vtigercrm-ci VERSION=8.3.0 ./build.sh --no-push

      - name: Verify schema.sql
        run: |
          test -s schema.sql
          LINES=$(wc -l < schema.sql)
          BYTES=$(wc -c < schema.sql)
          echo "schema.sql: ${LINES} lines / ${BYTES} bytes"
          test "${LINES}" -gt 100
          test "${BYTES}" -gt 10000

      - name: Start runtime smoke-test stack
        run: |
          docker network create vtiger-ci || true
          docker run -d --name vtiger-ci-mysql --network vtiger-ci \
            -e MYSQL_ROOT_PASSWORD=root \
            -e MYSQL_DATABASE=vtiger \
            -e MYSQL_USER=vtiger \
            -e MYSQL_PASSWORD=vtigerpass \
            mysql:8.0
          for i in $(seq 1 60); do
            docker exec vtiger-ci-mysql mysqladmin ping -h localhost -uroot -proot --silent 2>/dev/null && break
            sleep 3
          done
          docker run -d --name vtiger-ci-app --network vtiger-ci -p 8080:80 \
            -e DB_HOST=vtiger-ci-mysql \
            -e DB_PORT=3306 \
            -e DB_NAME=vtiger \
            -e DB_USER=vtiger \
            -e DB_PASSWORD=vtigerpass \
            -e DB_ROOT_PASSWORD=root \
            -e VTIGER_SITE_URL=http://localhost:8080 \
            vtigercrm-ci:8.3.0

      - name: Smoke check HTTP and fail fast if app exited
        run: |
          for i in $(seq 1 60); do
            if [ "$(docker inspect -f '{{.State.Running}}' vtiger-ci-app 2>/dev/null || echo false)" != "true" ]; then
              echo "App container exited early."
              docker logs vtiger-ci-app || true
              exit 1
            fi
            code="$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080 || true)"
            if [ "$code" != "000" ] && [ -n "$code" ]; then
              echo "Got HTTP ${code} — app is responding."
              exit 0
            fi
            echo "Attempt ${i}/60 — waiting for app..."
            sleep 3
          done
          echo "App never responded on port 8080."
          docker logs vtiger-ci-app || true
          exit 1

      - name: Collect logs on failure
        if: failure()
        run: |
          mkdir -p ci-artifacts
          cp schema.sql ci-artifacts/schema.sql 2>/dev/null || true
          docker logs vtiger-ci-app > ci-artifacts/runtime-app.log 2>&1 || true
          docker logs vtiger-ci-mysql > ci-artifacts/runtime-mysql.log 2>&1 || true
          docker logs vtiger-build-mysql > ci-artifacts/build-mysql.log 2>&1 || true
          docker logs vtiger-build-installer > ci-artifacts/build-installer.log 2>&1 || true
          docker compose -f docker-compose.build.yml logs > ci-artifacts/build-compose.log 2>&1 || true

      - name: Upload logs and schema on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-${{ github.sha }}
          retention-days: 7
          path: ci-artifacts

      - name: Tear down
        if: always()
        run: |
          docker rm -f vtiger-ci-app vtiger-ci-mysql || true
          docker network rm vtiger-ci || true
          docker compose -f docker-compose.build.yml down -v || true
