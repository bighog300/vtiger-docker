name: Nightly Smoke

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Run full local pipeline
        run: ./build.sh --no-push

      - name: Upload schema on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-debug
          retention-days: 7
          path: |
            schema.sql

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.build.yml down -v || true
          docker compose down -v || true
